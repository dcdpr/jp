default_job = "clippy_all"
env.CARGO_TERM_COLOR = "always"
hide_scrollbar = true

[jobs.check]
command = [
    "cargo",
    "check",
    "--all-targets",
    "--workspace",
    "--all-features",
    "--profile=lint",
]
need_stdout = false

[jobs.clippy_all]
command = [
    "cargo",
    "clippy",
    "--all-targets",
    "--workspace",
    "--all-features",
    "--profile=lint",
]
need_stdout = false

[jobs.clippy]
command = [
    "cargo",
    "clippy",
    "--workspace",
    "--all-features",
    "--profile=lint",
]
need_stdout = false

[jobs.test]
command = [
    "cargo",
    "nextest",
    "run",
    "--hide-progress-bar",
    "--failure-output",
    "final",
    "--profile=nextest",
]
need_stdout = true
analyzer = "nextest"

[jobs.test-doctests]
command = [
    "cargo",
    "test",
    "--workspace",
    "--all-features",
    "--doc",
    "--profile=nextest",
]

[jobs.doc]
command = [
    "cargo",
    "doc",
    "--no-deps",
    "--profile=docs",
]
need_stdout = false

[jobs.doc-open]
command = [
    "cargo",
    "doc",
    "--no-deps",
    "--profile=docs",
    "--open",
]
need_stdout = false
on_success = "back" # so that we don't open the browser at each change

# This parameterized job runs the example of your choice, as soon
# as the code compiles.
# Call it as
#    bacon ex -- my-example
[jobs.ex]
command = ["cargo", "run", "--example"]
need_stdout = true
allow_warnings = true
