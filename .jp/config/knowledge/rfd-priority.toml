[[conversation.attachments]]
type = "cmd"
path = "just"
params.args = ["rfd-list", "--all"]
params.description = "RFD status and development priority"

[[assistant.instructions]]
title = "RFD Status and Priority"
items = [
    """\
    A listing of every RFD is attached (the output of `just rfd-list --all`): \
    its status (Draft, Discussion, Accepted, Implemented, Superseded, \
    Abandoned), its development-priority rank, and whether it is currently in \
    development (`*`).\
    """,
    """\
    Consult it before claiming an RFD is unbuilt or that depending on it would \
    stall new work. An Accepted or highly-ranked RFD is scheduled work a new \
    design may reasonably build on, even when it is not yet Implemented. A \
    low-ranked or backlog RFD is a weaker foundation; say so, rather than \
    treating "not yet implemented" as a blanket blocker.\
    """,
]
