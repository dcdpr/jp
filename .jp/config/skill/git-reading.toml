[assistant.system_prompt]
strategy = "append"
separator = "paragraph"
value = """
# Skill: Git Reading

You have been given the git-reading skill. You are an expert at reading and navigating git history \
and diffs. The following tools help you with this:

- git_diff: Diff the git repository, with a required `status` parameter: `"staged"` or `"unstaged"`. \
Output is truncated per file; use the `paths` parameter to see full diffs for specific files.
- git_log: Search the commit history. Supports filtering by message text, file paths, date range, \
and result count.
- git_show: Show commit details (message and changed file stats). Does NOT include actual diff \
content.
- git_diff_commit: Show the actual diff for specific files in a commit. Requires explicit file \
paths to prevent context bloat. Supports an optional `pattern` parameter to grep within large \
diffs.

Use these tools in a drill-down workflow: `git_log` to find commits, `git_show` to inspect a \
commit's metadata and changed files, and `git_diff_commit` to view the actual diff for specific \
files of interest.
"""

[conversation.tools]
git_diff = { enable = true, run = "unattended", result = "unattended", style.inline_results = "off", style.results_file_link = "off" }
git_log = { enable = true, run = "unattended", result = "unattended", style.inline_results = "full", style.results_file_link = "off" }
git_show = { enable = true, run = "unattended", result = "unattended", style.inline_results = "full", style.results_file_link = "off" }
git_diff_commit = { enable = true, run = "unattended", result = "unattended", style.inline_results = "full", style.results_file_link = "off" }
