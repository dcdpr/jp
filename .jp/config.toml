extends = [
    "config/personas/default.toml",
    "mcp/tools/**/*.toml",
]

config_load_paths = [
    ".jp/config",
    ".jp/config/personas",
]

[providers.llm]
anthropic.beta_headers = [
    "interleaved-thinking-2025-05-14",
    "context-management-2025-06-27",
]

[providers.llm.aliases]
# Anthropic aliases
anthropic = "anthropic/claude-sonnet-4-6"
claude = "anthropic/claude-sonnet-4-6"
sonnet = "anthropic/claude-sonnet-4-6"
opus = "anthropic/claude-opus-4-7"
haiku = "anthropic/claude-haiku-4-5"
# OpenAI aliases
openai = "openai/gpt-5.5"
chatgpt = "openai/gpt-5.5"
gpt = "openai/gpt-5.5"
gpt5 = "openai/gpt-5.5"
gpt5-pro = "openai/gpt-5.5-pro"
gpt-pro = "openai/gpt-5.5-pro"
gpt5-mini = "openai/gpt-5.4-mini"
gpt-mini = "openai/gpt-5.4-mini"
gpt5-nano = "openai/gpt-5.4-nano"
gpt-nano = "openai/gpt-5.4-nano"
o3-research = "openai/o3-deep-research"
o4-mini-research = "openai/o4-mini-deep-research"
codex = "openai/gpt-5.3-codex"
gpt-5-codex = "openai/gpt-5-codex"
codex-mini = "openai/gpt-5.1-codex-mini"
# Google aliases
google = "google/gemini-3.1-pro-preview"
gemini = "google/gemini-3.1-pro-preview"
gemini-pro = "google/gemini-3.1-pro-preview"
gemini-flash = "google/gemini-3-flash-preview"
gemini-lite = "google/gemini-2.5-flash-lite"

[conversation.inquiry.assistant.model]
id = "haiku"
parameters.reasoning.effort = "auto"

[conversation.title.generate.model]
id = "haiku"
parameters.reasoning.effort = "low"

[style.code]
copy_link = "osc8"

[style.reasoning]
display = "full"

[conversation.tools.'*']
run = "ask"
