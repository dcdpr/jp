[conversation.tools.github_create_issue_enhancement]
enable = false
source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "File a new enhancement request in the project's GitHub repository."
description = """
- MOST IMPORTANTLY: Avoid fluff, and focus on the enhancement at hand. Do not
  add more text than is necessary to explain the enhancement.

- Use markdown to format text.

- Explain the motivation for creating the issue. You can include a comparison of
  the current behavior with the expected behavior in order to illustrate the
  impact of the request.

- Use the body to explain what and why vs. how.

- Wrap the body at 72 characters.

- Use backticks (``) to format code or crate references.

- Add optional references to related issues or PRs in the body.

- Link to relevant code, documentation, or other resources in the body, using
  proper Github links.

- Use a narrative style to describe the issue in one or more paragraphs, avoid
  using lists, unless they are necessary to convey details about the issue.
"""

examples = """
```json
{
  "title": "Support lazy loading of tool descriptions",
  "description": "Tool descriptions consume significant context. Allow LLMs to load details on demand.",
  "context": "Large tool descriptions eat into the context window, reducing space for conversation history.",
  "complexity": "medium"
}
```
"""

[conversation.tools.github_create_issue_enhancement.parameters.title]
type = "string"
required = true
summary = "The title of the enhancement to track."
description = """
Should be a single line, not include any markdown except for backticks (`) where
applicable. Keep the title short and descriptive.
"""

[conversation.tools.github_create_issue_enhancement.parameters.description]
type = "string"
required = true
summary = "A clear and concise description of what the enhancement request is about."
description = """
Explain the motivation for creating the issue.
"""

[conversation.tools.github_create_issue_enhancement.parameters.context]
type = "string"
required = true
summary = "What are you trying to do and how would you want it to be different?"
description = """
Is it something you currently cannot do? Is this related to an issue/problem?
"""

[conversation.tools.github_create_issue_enhancement.parameters.complexity]
type = "string"
enum = ["low", "medium", "high"]
required = true
summary = "Complexity of the enhancement."
description = """
This is used to estimate the effort required to implement the enhancement.
"""

[conversation.tools.github_create_issue_enhancement.parameters.alternatives]
type = "string"
summary = "Can the same result be achieved in an alternative way?"
description = """
Is the alternative considerable?
"""

[conversation.tools.github_create_issue_enhancement.parameters.proposed_implementation]
type = "string"
summary = "Optional proposed implementation for the enhancement."
description = """
Should be a high-level, SHORT description. Keep it brief, avoid detail.
If code is added, use pseudo-code to avoid obsolescence.
"""

[conversation.tools.github_create_issue_enhancement.parameters.tasks]
type = "array"
items.type = "string"
summary = "Optional ordered tasks to implement the enhancement."
description = """
Include links to specific lines of code where the task should happen at.
"""

[conversation.tools.github_create_issue_enhancement.parameters.resource_links]
type = "array"
items.type = "string"
summary = "Optional list of resource links relevant to the issue."
description = """
Links should only contain the path, not the full URL.

Supported formats:
- issue: issues/{number}
- pull: pull/{number}
- commit: commit/{hash}
- file: blob/{hash}/{path}
- lines: blob/{hash}/{path}#L{start}-L{end}
"""

[conversation.tools.github_create_issue_enhancement.parameters.labels]
type = "array"
items.type = "string"
summary = "Additional labels to add to the issue."
description = """
- The issue will always be assigned the `enhancement` label.
- If unspecified, no additional labels will be added.
- Only labels that exist on the project can be added, non-existing labels will
  result in an error with a list of valid labels, so you can retry again.
"""

[conversation.tools.github_create_issue_enhancement.parameters.assignees]
type = "array"
items.type = "string"
summary = "Assignees to add to the issue."
description = """
- You should only add assignees if explicitly requested by the user.
- If unspecified, no assignees will be added.
- Only collaborators on the project can be added, non-existing assignees will
  result in an error with a list of valid assignees, so you can retry again.
"""
