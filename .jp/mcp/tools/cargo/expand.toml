[conversation.tools.cargo_expand]
enable = false
run = "unattended"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "Expand the auto-generated Rust code for the given module or item."

examples = """
Expand a module in a workspace package:
```json
{"package": "jp_config", "item": "conversation::tool"}
```

Expand a top-level item:
```json
{"item": "os::unix::ffi"}
```
"""

[conversation.tools.cargo_expand.style]
inline_results = "off"
results_file_link = "off"
parameters = "function_call"

[conversation.tools.cargo_expand.parameters.package]
summary = "Package to find the item in, required if working with a workspace."
type = "string"

[conversation.tools.cargo_expand.parameters.item]
summary = "Local path to module or other named item to expand, e.g. os::unix::ffi"
required = true
type = "string"
