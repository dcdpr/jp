[conversation.tools.cargo_check]
enable = false
run = "unattended"
source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "Run `cargo check` for the given package, validating if the code compiles. Also reports doc comments that are badly formatted; run `cargo_fmt` to auto-fix them."

examples = """
```json
{"package": "jp_cli"}
```

```json
{}
```
When no package is specified, all workspace packages will be checked.
"""

# Use content checksums instead of file mtimes for cargo's freshness checks,
# so sibling checkouts (git worktrees) sharing a target dir cannot serve each
# other's stale artifacts. Requires nightly cargo (rust-lang/cargo#14136);
# defaults to off so the tool also works on stable Rust.
options.checksum_freshness = true

[conversation.tools.cargo_check.style]
inline_results = "full"
results_file_link = "off"
parameters = "function_call"

[conversation.tools.cargo_check.parameters.package]
summary = "Package to run check for, if unspecified, all workspace packages will be checked."
type = "string"
