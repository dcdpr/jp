[conversation.tools.fs_list_files]
enable = false
run = "unattended"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "List files in the project's local filesystem."
description = """
Results honor the workspace `.ignore` file with gitignore semantics,
including negations. Note the gitignore re-inclusion rule: files inside
an excluded tree stay hidden unless the directory and its contents are
negated separately and seemingly redundantly (`!/target/doc/` and
`!/target/doc/**`). If a file exists on disk but is absent from the
listing, it matched an `.ignore` rule.
"""

examples = """
List all Rust files:
```json
{"extensions": ["rs"]}
```

List files under a specific directory:
```json
{"prefixes": ["crates/jp_cli/src"]}
```

List all files in the project:
```json
{}
```
"""

[conversation.tools.fs_list_files.style]
inline_results = "off"
results_file_link = "off"
parameters = "function_call"

[conversation.tools.fs_list_files.parameters.prefixes]
type = "array"
items.type = "string"
summary = "Optional list of path prefixes to filter the results by."
description = """
If unspecified, all files in the project will be returned.
"""

[conversation.tools.fs_list_files.parameters.extensions]
type = "array"
items.type = "string"
summary = "Optional list of file extensions to filter the results by."
description = """
If unspecified, all extensions will be returned.
"""
