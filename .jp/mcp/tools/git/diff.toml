[conversation.tools.git_diff]
enable = "explicit"
run = "unattended"
style.inline_results = "full"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "List the differences between the current state of the git repository and the last committed state."

examples = """
Diff unstaged changes in specific files:
```json
{"paths": ["crates/jp_config/src/conversation/tool.rs"]}
```

Diff staged changes:
```json
{"paths": ["src/"], "cached": true}
```
"""

[conversation.tools.git_diff.parameters.paths]
type = "array"
items.type = "string"
required = true
summary = "The paths to diff. Can be a single path or a list of paths."

[conversation.tools.git_diff.parameters.cached]
type = "boolean"
summary = "If true, diff staged changes instead of unstaged."
description = """
If `true`, the diff will be computed against the cached (staged) state of the
git repository. If `false` or unspecified, the diff will be computed against
the last committed state.
"""
