[conversation.tools.git_stage_raw_patch]
enable = "explicit"
run = "unattended"
style.inline_results = "full"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "Apply a hand-edited unified diff to the git index, enabling surgical staging of partial hunks."
description = """
Accepts a file path and raw unified diff content (hunk headers and body), \
wraps it with the appropriate git diff headers, and applies it to the index \
via `git apply --cached --unidiff-zero`.

Use this when `git_stage_patch` cannot stage changes at the granularity you \
need — for example, when a single hunk from `git_list_patches` contains \
multiple unrelated changes on adjacent lines.

To edit a hunk retrieved from `git_list_patches`:
- To exclude a deletion: change the `-` prefix to a space (` `) so the line \
becomes context.
- To exclude an addition: remove the `+` line entirely.
- Adjust the line counts in the `@@` hunk header to match.
"""

examples = """
Stage only part of a hunk:
```json
{"path": "src/lib.rs", "diff": "@@ -5,2 +5,1 @@\\n-old line 5\\n-old line 6\\n+new line 5\\n"}
```
"""


[conversation.tools.git_stage_raw_patch.parameters.path]
type = "string"
required = true
summary = "The file path being patched."

[conversation.tools.git_stage_raw_patch.parameters.diff]
type = "string"
required = true
summary = "Raw unified diff content to apply."
description = """
One or more unified diff hunks, each starting with a `@@` hunk header \
followed by the diff body (lines prefixed with `-`, `+`, or ` `). \
The tool wraps this with the `diff --git`/`---`/`+++` headers automatically.
"""
