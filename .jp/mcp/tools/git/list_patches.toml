[conversation.tools.git_list_patches]
enable = "explicit"
run = "unattended"
style.inline_results = "full"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "List all unstaged patches that can be staged with `git_stage_patch`."
description = """
Each patch has a unique identifier per file, which can be used in \
`git_stage_patch` to stage the patch in the repository index. Each diff \
line is prefixed with `[N]` for use with `git_stage_patch_lines`.
"""

examples = """
List all unstaged patches across the entire repository:
```json
{}
```

List patches for specific files:
```json
{"files": ["crates/jp_config/src/conversation/tool.rs", "crates/jp_llm/src/builtin.rs"]}
```
"""

[conversation.tools.git_list_patches.parameters.files]
type = "array"
items.type = "string"
summary = "Optional list of files to list patches for. If omitted, lists patches for all files with unstaged changes."
