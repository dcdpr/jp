[conversation.tools.git_diff_file]
enable = "explicit"
run = "unattended"
style.inline_results = "full"
style.parameters = "function_call"

source = "local"
command = "just serve-tools {{context}} {{tool}}"
summary = "Show the full diff for specific staged or unstaged files."
description = """
Working-tree analog of `git_diff_commit`. Use this when `git_diff` truncates \
a file you want to inspect in full.

The `paths` parameter is required to prevent accidentally dumping massive \
diffs.

If the diff exceeds 500 lines, it is truncated with a message suggesting \
the use of the `pattern` parameter.

When `pattern` is provided, the tool greps within the diff output and \
returns only matching lines with surrounding context, similar to \
`fs_grep_files`. This is useful for large diffs where you only care \
about specific changes.
"""

examples = """
Show the full unstaged diff for one file:
```json
{"status": "unstaged", "paths": ["crates/jp_llm/src/stream.rs"]}
```

Show the full staged diff for multiple files:
```json
{"status": "staged", "paths": ["src/main.rs", "src/lib.rs"]}
```

Search within a large unstaged diff:
```json
{"status": "unstaged", "paths": ["crates/jp_config/src/lib.rs"], "pattern": "fn parse", "context": 5}
```
"""

[conversation.tools.git_diff_file.parameters.status]
type = "string"
enum = ["staged", "unstaged"]
required = true
summary = "Which changes to include in the diff."
description = """
- `"staged"`: changes in the index that differ from HEAD (HEAD vs index).
- `"unstaged"`: changes in the working tree that differ from the index (index vs working tree).

A staged change will NOT appear in the `"unstaged"` diff and vice versa.
"""

[conversation.tools.git_diff_file.parameters.paths]
type = "array"
items.type = "string"
required = true
summary = "Files to show the diff for. Required to prevent accidental full-tree diff dumps."

[conversation.tools.git_diff_file.parameters.pattern]
type = "string"
summary = "Regex pattern to search within the diff output. When set, only matching lines with context are returned instead of the full diff."

[conversation.tools.git_diff_file.parameters.context]
type = "integer"
summary = "Number of context lines around pattern matches. Defaults to 3 when `pattern` is set. Ignored without `pattern`."
