[package]
name = "grizzly"

authors = ["Jean Mertz <git@jeanmertz.com>"]
description = "A Bear.app MCP server"
edition = "2024"
license = "MIT"
publish = false
readme = "README.md"
version = "0.1.0"

[dependencies]
jp_tool = { workspace = true }

chrono = { workspace = true }
clap = { workspace = true, features = ["std", "derive", "help"] }
directories = { workspace = true }
rmcp = { workspace = true, features = ["server", "transport-io", "macros"] }
rusqlite = { workspace = true, features = ["bundled", "array", "vtab"] }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

[dev-dependencies]
indoc = { workspace = true }

[lints]
workspace = true

[[bin]]
name = "grizzly"
path = "src/main.rs"
